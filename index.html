// ============ CATEGORY SWITCH ============
function switchCat(cat) {
    curCat = cat;
    var tabs = document.querySelectorAll('.cat-tab');
    for (var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
    var idx = {veg:0, pork:1, poultry:2, seafood:3}[cat];
    tabs[idx].classList.add('active');
    
    // show/hide market bar
    document.getElementById('marketBar').style.display = (cat === 'veg') ? '' : 'none';
    
    // update filter options
    var filter = document.getElementById('catFilter');
    var vegOpts = ['全部','叶菜','花果','茄果','瓜果','根茎','葱蒜','豆类','菌菇','其他'];
    var otherOpts = ['全部'];
    
    var opts = (cat === 'veg') ? vegOpts : otherOpts;
    // add data-specific categories
    var d = {veg: VEG_DATA_WX, pork: PORK_DATA, poultry: POULTRY_DATA, seafood: SEAFOOD_DATA}[cat];
    var seen = {};
    for (var i=0; i<d.items.length; i++) {
        var c = d.items[i].category;
        if (!seen[c] && opts.indexOf(c) < 0) { seen[c]=true; opts.push(c); }
    }
    
    filter.innerHTML = '';
    for (var i=0; i<opts.length; i++) {
        filter.innerHTML += '<option value="' + opts[i] + '">' + opts[i] + '</option>';
    }
    
    // load data
    if (cat === 'veg') {
        curData = vegByMarket[curMkt];
    } else {
        curData = d;
    }
    
    var names = {veg:'蔬菜', pork:'猪肉', poultry:'禽蛋', seafood:'水产'};
    var emojis = {veg:'🥬', pork:'🥩', poultry:'🥚', seafood:'🐟'};
    document.getElementById('pageTitle').textContent = emojis[cat] + ' 悦鲜森 · 全国' + names[cat] + '价格查询';
    
    renderAll();
}

// ============ MARKET SWITCH ============
function switchMkt(mkt) {
    curMkt = mkt;
    var btns = document.querySelectorAll('.mkt-btn');
    for (var i=0; i<btns.length; i++) btns[i].style.opacity = '0.5';
    document.getElementById('btn' + mkt.toUpperCase()).style.opacity = '1';
    curData = vegByMarket[mkt];
    renderAll();
}

// ============ RENDER ============
function renderAll() {
    var d = curData;
    if (!d) { console.error('renderAll: curData is null'); return; }
    if (!d.items) { console.error('renderAll: no items in data'); return; }
    document.getElementById('dataDate').textContent = d.date || '--';
    document.getElementById('dataSource').textContent = d.source || '--';
    document.getElementById('activeCount').textContent = d.activeItems || 0;
    document.getElementById('avgPrice').textContent = (d.avgPrice || 0).toFixed(2);
    document.getElementById('upCount').textContent = d.upCount || 0;
    document.getElementById('downCount').textContent = d.downCount || 0;
    document.getElementById('flatCount').textContent = d.flatCount || 0;
    renderTable();
}

function renderTable() {
    var items = curData.items;
    var filter = document.getElementById('catFilter').value;
    var search = document.getElementById('searchInput').value.toLowerCase();
    
    if (filter !== '全部') {
        items = items.filter(function(i) { return i.category === filter; });
    }
    if (search) {
        items = items.filter(function(i) { return i.name.toLowerCase().indexOf(search) >= 0; });
    }
    
    var h = '';
    for (var i=0; i<items.length; i++) {
        var it = items[i];
        var cls = it.change > 0 ? 'up' : it.change < 0 ? 'down' : 'flat';
        var sign = it.change > 0 ? '+' : '';
        var txt = it.change === 0 ? '→' : (sign + it.change.toFixed(2));
        var stag = '';
        if (it.supplyStatus === 'in_season') {
            stag = '<span class="stag s-' + (it.season || '全年') + '">当季</span>';
        }
        h += '<tr>';
        h += '<td><b>' + it.name + '</b></td>';
        h += '<td>' + (it.category || '') + '</td>';
        h += '<td><b>' + it.price.toFixed(2) + '</b></td>';
        h += '<td>' + (it.yesterdayPrice || 0).toFixed(2) + '</td>';
        h += '<td class="' + cls + '">' + txt + '</td>';
        h += '<td>' + stag + '</td>';
        h += '</tr>';
    }
    if (items.length === 0) h = '<tr><td colspan="6" style="text-align:center;color:#999;padding:30px">无匹配数据</td></tr>';
    document.getElementById('priceBody').innerHTML = h;
    
    // sidebar
    renderSidebar(items);
}

function renderSidebar(items) {
    var sorted = items.slice().sort(function(a,b){ return b.change - a.change; });
    var top5 = sorted.slice(0,5);
    var bot5 = sorted.slice(-5).reverse();
    
    document.getElementById('topRise').innerHTML = top5.map(function(i){
        return '<div class="tm-item"><span>' + i.name + '</span><span class="up">' + (i.change > 0 ? '+' : '') + i.change.toFixed(2) + '</span></div>';
    }).join('');
    
    document.getElementById('topFall').innerHTML = bot5.map(function(i){
        return '<div class="tm-item"><span>' + i.name + '</span><span class="down">' + i.change.toFixed(2) + '</span></div>';
    }).join('');
    
    var catMap = {};
    for (var i=0; i<items.length; i++) {
        var c = items[i].category;
        if (!catMap[c]) catMap[c] = {sum:0, cnt:0};
        catMap[c].sum += items[i].price;
        catMap[c].cnt += 1;
    }
    var cats = Object.keys(catMap);
    document.getElementById('catAvg').innerHTML = cats.map(function(k){
        return '<div class="tm-item"><span>' + k + '</span><span>' + (catMap[k].sum / catMap[k].cnt).toFixed(2) + '</span></div>';
    }).join('');
}

// ============ EXPORT ============
function getExportData() {
    var items = curData.items;
    var mktName = mktNames[curMkt] || curMkt;
    var date = curData.date || '--';
    var rows = [];
    // header
    rows.push(['市场', mktName]);
    rows.push(['日期', date]);
    rows.push(['品种', '品类', '今日价(元/斤)', '昨日价(元/斤)', '涨跌(元)', '涨跌幅(%)', '供应状态']);
    for (var i = 0; i < items.length; i++) {
        var it = items[i];
        rows.push([it.name, it.category || '', it.price.toFixed(2), (it.yesterdayPrice || 0).toFixed(2), (it.change || 0).toFixed(2), (it.pctChange || 0).toFixed(1), it.supplyStatus === 'in_season' ? '当季' : '下市']);
    }
    return rows;
}

function exportCSV() {
    var rows = getExportData();
    var csv = '\uFEFF'; // BOM for Excel UTF-8
    for (var i = 0; i < rows.length; i++) {
        csv += rows[i].map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',') + '\n';
    }
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '悦鲜森_' + curMkt.toUpperCase() + '_' + curData.date + '.csv';
    a.click();
    URL.revokeObjectURL(url);
}

function exportExcel() {
    var rows = getExportData();
    var html = '<table>';
    for (var i = 0; i < rows.length; i++) {
        html += '<tr>';
        for (var j = 0; j < rows[i].length; j++) {
            var tag = (i >= 2 && j >= 2 && j <= 5) ? 'td' : 'td'; // all td for simplicity
            html += '<' + tag + '>' + rows[i][j] + '</' + tag + '>';
        }
        html += '</tr>';
    }
    html += '</table>';
    var blob = new Blob(['<html><head><meta charset="UTF-8"></head><body>' + html + '</body></html>'], { type: 'application/vnd.ms-excel' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '悦鲜森_' + curMkt.toUpperCase() + '_' + curData.date + '.xls';
    a.click();
    URL.revokeObjectURL(url);
}

// ============ INIT ============
// Wait for DOM to be ready
// Populate history dates
function populateHistDates() {
    var sel = document.getElementById('histDate');
    if (!sel) return;
    var today = new Date(2026, 6, 12); // July 12, 2026
    for (var i = 0; i < 60; i++) {
        var d = new Date(today);
        d.setDate(d.getDate() - i);
        var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        var opt = document.createElement('option');
        opt.value = ds;
        opt.textContent = ds;
        sel.appendChild(opt);
    }
}
function openHistory() {
    var d = document.getElementById('histDate').value;
    if (!d) return;
    var url = 'https://msp.njaf.gov.cn:37073/localMarketConditionsPage?path=localMarketConditionsPage&marketId=5&categoryId=1';
    window.open(url, '_blank');
}

document.addEventListener('DOMContentLoaded', function() {
    populateHistDates();
    try {
        renderAll();
        console.log('悦鲜森: initialized with ' + (curData && curData.items ? curData.items.length : 0) + ' items');
    } catch(e) {
        console.error('悦鲜森 init error:', e);
        document.getElementById('priceBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;padding:30px">初始化错误: ' + e.message + '</td></tr>';
    }
});
// Also run immediately in case DOMContentLoaded already fired
if (document.readyState !== 'loading') {
    renderAll();
}

var chartRange = 7;

function getHistoryDataForCurrent() {
    // 根据当前市场/品类获取对应历史数据
    var key = curMkt;
    if (curCat !== 'veg') {
        key = curCat; // pork, poultry, seafood
    }
    return HISTORY_DATA[key] || HISTORY_DATA[curCat] || [];
}

function populateChartItems() {
    var sel = document.getElementById('chartItem');
    if (!sel) return;
    sel.innerHTML = '';
    var items = curData && curData.items ? curData.items : [];
    for (var i = 0; i < items.length; i++) {
        var opt = document.createElement('option');
        opt.value = items[i].name;
        opt.textContent = items[i].name;
        sel.appendChild(opt);
    }
    // 默认选第一个
    if (items.length > 0) {
        sel.value = items[0].name;
    }
}

function setChartRange(days, btn) {
    chartRange = days;
    var btns = document.querySelectorAll('.chart-range-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    if (btn) btn.classList.add('active');
    drawChart();
}

function drawChart() {
    var canvas = document.getElementById('priceChart');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    
    var itemName = document.getElementById('chartItem').value;
    var histData = getHistoryDataForCurrent();
    
    if (!histData || histData.length === 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#999';
        ctx.font = '13px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('暂无历史数据', canvas.width/2, canvas.height/2);
        document.getElementById('chartInfo').textContent = '';
        return;
    }
    
    // 取最近 N 天
    var recent = histData.slice(-chartRange);
    
    // 提取该品种的价格时间序列
    var dates = [];
    var prices = [];
    for (var i = 0; i < recent.length; i++) {
        var day = recent[i];
        var found = null;
        for (var j = 0; j < day.items.length; j++) {
            if (day.items[j].name === itemName) {
                found = day.items[j];
                break;
            }
        }
        dates.push(day.date);
        prices.push(found ? found.price : null);
    }
    
    document.getElementById('chartInfo').textContent = 
        itemName + ' · ' + (chartRange === 7 ? '近7天' : '近30天') + ' · 共' + recent.length + '天数据';
    
    // 设置 canvas 尺寸
    var wrap = document.getElementById('chartCanvasWrap');
    var dpr = window.devicePixelRatio || 1;
    var rect = wrap.getBoundingClientRect();
    var w = rect.width;
    var h = 320;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);
    
    // 找到有效价格范围
    var validPrices = prices.filter(function(p) { return p !== null; });
    if (validPrices.length === 0) {
        ctx.fillStyle = '#999';
        ctx.font = '13px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('该品种暂无历史数据', w/2, h/2);
        return;
    }
    
    var minPrice = Math.min.apply(null, validPrices);
    var maxPrice = Math.max.apply(null, validPrices);
    var range = maxPrice - minPrice;
    if (range === 0) range = 1;
    minPrice -= range * 0.15;
    maxPrice += range * 0.15;
    if (minPrice < 0) minPrice = 0;
    
    // 绘图区域
    var pad = {top: 20, right: 30, bottom: 40, left: 55};
    var pw = w - pad.left - pad.right;
    var ph = h - pad.top - pad.bottom;
    
    // 清空
    ctx.clearRect(0, 0, w, h);
    
    // 背景
    ctx.fillStyle = '#fafbfc';
    ctx.fillRect(pad.left, pad.top, pw, ph);
    
    // 网格线
    var gridLines = 5;
    ctx.strokeStyle = '#e8e8e8';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    for (var i = 0; i <= gridLines; i++) {
        var y = pad.top + (ph / gridLines) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + pw, y);
        ctx.stroke();
        
        // Y 轴标签
        var val = maxPrice - ((maxPrice - minPrice) / gridLines) * i;
        ctx.fillStyle = '#666';
        ctx.font = '10px Microsoft YaHei';
        ctx.textAlign = 'right';
        ctx.fillText(val.toFixed(2), pad.left - 6, y + 3);
    }
    ctx.setLineDash([]);
    
    // X 轴标签
    ctx.fillStyle = '#666';
    ctx.font = '9px Microsoft YaHei';
    ctx.textAlign = 'center';
    var maxLabels = Math.floor(pw / 55);
    var step = Math.max(1, Math.ceil(dates.length / maxLabels));
    for (var i = 0; i < dates.length; i += step) {
        var x = pad.left + (pw / (dates.length - 1 || 1)) * i;
        ctx.fillText(dates[i].slice(5), x, pad.top + ph + 16);
    }
    
    // 坐标轴
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + ph);
    ctx.lineTo(pad.left + pw, pad.top + ph);
    ctx.stroke();
    
    // 标题
    ctx.fillStyle = '#1a5276';
    ctx.font = 'bold 12px Microsoft YaHei';
    ctx.textAlign = 'left';
    ctx.fillText(itemName + ' 价格走势', pad.left, pad.top - 6);
    
    // Y轴单位
    ctx.fillStyle = '#999';
    ctx.font = '9px Microsoft YaHei';
    ctx.textAlign = 'left';
    ctx.fillText('元/斤', pad.left + 4, pad.top - 6);
    
    // 绘制折线
    var lineColor = '#2e86c1';
    var pointColor = '#1a5276';
    
    // 收集有效点
    var validPoints = [];
    for (var i = 0; i < prices.length; i++) {
        if (prices[i] !== null) {
            var x = pad.left + (pw / (prices.length - 1 || 1)) * i;
            var y = pad.top + ph - ((prices[i] - minPrice) / (maxPrice - minPrice)) * ph;
            validPoints.push({x: x, y: y, price: prices[i], date: dates[i]});
        }
    }
    
    // 渐变填充
    if (validPoints.length > 1) {
        var grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ph);
        grad.addColorStop(0, 'rgba(46,134,193,0.25)');
        grad.addColorStop(1, 'rgba(46,134,193,0.02)');
        
        ctx.beginPath();
        ctx.moveTo(validPoints[0].x, validPoints[0].y);
        for (var i = 1; i < validPoints.length; i++) {
            // 贝塞尔曲线平滑
            if (validPoints[i-1] && validPoints[i]) {
                var cx = (validPoints[i-1].x + validPoints[i].x) / 2;
                ctx.quadraticCurveTo(validPoints[i-1].x, validPoints[i-1].y, cx, (validPoints[i-1].y + validPoints[i].y) / 2);
            }
        }
        ctx.lineTo(validPoints[validPoints.length-1].x, validPoints[validPoints.length-1].y);
        // 闭合填充区域
        ctx.lineTo(validPoints[validPoints.length-1].x, pad.top + ph);
        ctx.lineTo(validPoints[0].x, pad.top + ph);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
        
        // 折线
        ctx.beginPath();
        ctx.moveTo(validPoints[0].x, validPoints[0].y);
        for (var i = 1; i < validPoints.length; i++) {
            if (validPoints[i-1] && validPoints[i]) {
                var cx = (validPoints[i-1].x + validPoints[i].x) / 2;
                ctx.quadraticCurveTo(validPoints[i-1].x, validPoints[i-1].y, cx, (validPoints[i-1].y + validPoints[i].y) / 2);
            }
        }
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 数据点
        for (var i = 0; i < validPoints.length; i++) {
            var pt = validPoints[i];
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = pointColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 价格标注
            ctx.fillStyle = pointColor;
            ctx.font = 'bold 10px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText(pt.price.toFixed(2), pt.x, pt.y - 10);
        }
    }
    
    // 鼠标悬停事件
    canvas.onmousemove = function(e) {
        var rect2 = canvas.getBoundingClientRect();
        var mx = e.clientX - rect2.left;
        var my = e.clientY - rect2.top;
        var tooltip = document.getElementById('chartTooltip');
        
        var closest = null;
        var minDist = 30;
        for (var i = 0; i < validPoints.length; i++) {
            var dx = Math.abs(mx - validPoints[i].x);
            var dy = Math.abs(my - validPoints[i].y);
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < minDist) {
                minDist = dist;
                closest = validPoints[i];
            }
        }
        
        if (closest) {
            tooltip.style.display = 'block';
            tooltip.style.left = (closest.x + 12) + 'px';
            tooltip.style.top = (closest.y - 30) + 'px';
            tooltip.innerHTML = '<b>' + closest.date + '</b><br>' + itemName + ': ' + closest.price.toFixed(2) + ' 元/斤';
        } else {
            tooltip.style.display = 'none';
        }
    };
    
    canvas.onmouseleave = function() {
        document.getElementById('chartTooltip').style.display = 'none';
    };
}

// 重写 renderAll 以同时更新图表
var _originalRenderAll = renderAll;
renderAll = function() {
    _originalRenderAll();
    setTimeout(function() {
        populateChartItems();
        drawChart();
    }, 100);
};

</script>
